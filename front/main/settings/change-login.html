<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Смена логина — CLAIR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>

<body class="auth-page">
  <div class="container">
    <div id="header"></div>
    <main>
      <div class="auth-wrapper">
        <div class="top-logo"><img src="../assets/logo/logo.svg" alt="CLAIR"></div>
        <div class="card-auth">
          <h4><b>Смена логина</b></h4>
          <div class="subtext">Если аккаунт был взломан — смените логин</div>

          <form id="changeUsernameForm">
            <label class="form-label-custom" for="currentUsername">Текущий логин</label>
            <input id="currentUsername" class="form-control" type="text" required>

            <label class="form-label-custom" for="newUsername">Новый логин</label>
            <input id="newUsername" class="form-control" type="text" required minlength="3">

            <label class="form-label-custom" for="emailCode">Код подтверждения</label>
            <input id="emailCode" class="form-control" type="text" required>

            <button class="btn btn-secondary mt-2" type="button" onclick="sendEmailCode()">Отправить код на
              email</button>

            <button class="btn btn-primary btn-primary-custom mt-3" type="submit">Изменить логин</button>
            <button class="btn btn-outline btn-outline-custom mt-2" type="button"
              onclick="window.location.href='settings.html'">Назад</button>
          </form>
          <div id="message" class="mt-3" role="alert"></div>

        </div>
      </div>
    </main>
  </div>

  <script src="../../scripts/config.js"></script>
  <script>
    // show current login
    const currentLogin = localStorage.getItem("userName") || "user";
    document.getElementById("currentUsername").value = currentLogin.split(" ")[0] || currentLogin;

    function sendEmailCode() {
      // TODO: fetch to backend /api/auth/send-change-username-code
      alert("Код отправлен на ваш email. Проверьте почту.");
    }

    const out = document.getElementById("out");
    const message = document.getElementById("message");
    document.getElementById("changeUsernameForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!confirm("Подтвердить изменение логина?")) return;
      const currentUsername = document.getElementById("currentUsername").value.trim();
      const newUsername = document.getElementById("newUsername").value.trim();
      const emailCode = document.getElementById("emailCode").value.trim();
      if (!emailCode) { alert("Введите код подтверждения!"); return; }
      try {
        const r = await retryFetch(window.API_BASE + "/api/auth/change-username", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ currentUsername, newUsername, emailCode })
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) {
          message.textContent = data.error || "Ошибка смены логина";
          message.style.color = "red";
        } else {
          message.textContent = "Логин успешно изменён!";
          message.style.color = "green";
          // Optional: redirect after success
          setTimeout(() => window.location.href = 'settings.html', 2000);
        }
      } catch (err) {
        message.textContent = "Ошибка соединения";
        message.style.color = "red";
      }
    });

    loadHeader();
    loadFooter();
  </script>
</body>

</html>
