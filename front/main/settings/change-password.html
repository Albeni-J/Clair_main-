<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Смена пароля — CLAIR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>

<body class="auth-page">
  <div class="container">
    <div id="header"></div>
    <main>
      <div class="auth-wrapper">
        <div class="top-logo"><img src="../assets/logo/logo.svg" alt="CLAIR"></div>
        <div class="card-auth">
          <h4><b>Смена пароля</b></h4>
          <div class="subtext">Рекомендуется менять пароль каждые 90 дней</div>

          <form id="changePasswordForm">
            <label class="form-label-custom" for="oldPassword">Текущий пароль</label>
            <input id="oldPassword" class="form-control" type="password" value="********" readonly>

            <label class="form-label-custom" for="newPassword">Новый пароль</label>
            <input id="newPassword" class="form-control" type="password" required minlength="6">

            <label class="form-label-custom" for="confirmPassword">Подтверждение пароля</label>
            <input id="confirmPassword" class="form-control" type="password" required minlength="6">

            <label class="form-label-custom" for="emailCode">Код подтверждения</label>
            <input id="emailCode" class="form-control" type="text" required>

            <button class="btn btn-secondary mt-2" type="button" onclick="sendEmailCode()">Отправить код на
              email</button>

            <button class="btn btn-primary btn-primary-custom mt-3" type="submit">Изменить пароль</button>
            <button class="btn btn-outline btn-outline-custom mt-2" type="button"
              onclick="window.location.href='settings.html'">Назад</button>
          </form>
          <div id="message" class="mt-3" role="alert"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../scripts/config.js"></script>
  <script>
    function sendEmailCode() {
      // TODO: fetch to backend /api/auth/send-change-password-code
      alert("Код отправлен на ваш email. Проверьте почту.");
    }

    const out = document.getElementById("out");
    const message = document.getElementById("message");
    document.getElementById("changePasswordForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!confirm("Подтвердить изменение пароля?")) return;
      const oldPassword = document.getElementById("oldPassword").value;
      const newPassword = document.getElementById("newPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const emailCode = document.getElementById("emailCode").value;
      if (newPassword !== confirmPassword) {
        message.textContent = "Пароли не совпадают!";
        message.style.color = "red";
        return;
      }
      if (!emailCode) {
        message.textContent = "Введите код подтверждения!";
        message.style.color = "red";
        return;
      }
      try {
        const r = await retryFetch(window.API_BASE + "/api/auth/change-password", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ oldPassword, newPassword, emailCode })
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) {
          message.textContent = data.error || "Ошибка смены пароля";
          message.style.color = "red";
        } else {
          message.textContent = "Пароль успешно изменён!";
          message.style.color = "green";
          setTimeout(() => window.location.href = 'settings.html', 2000);
        }
      } catch (err) {
        message.textContent = "Ошибка соединения";
        message.style.color = "red";
      }
    });

    loadHeader();
    loadFooter();
  </script>
</body>

</html>
