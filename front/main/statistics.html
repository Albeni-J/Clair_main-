<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>CLAIR — Статистика</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../assets/css/style.css">

  <style>
    .stats-page main {
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 15px;
      gap: 15px;
      width: 100%;
      overflow-y: auto;
    }

    .stats-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      width: 100%;
      max-width: 1100px;
    }

    .stat-card {
      flex: 1 1 180px;
      background: #fff;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .stat-card h3 {
      color: #2e44ff;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .stat-card p {
      font-size: 20px;
      font-weight: 600;
      color: #333;
      margin: 0;
    }

    #chart_div {
      width: 100%;
      max-width: 1100px;
      height: 300px;
      background: #fff;
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    .stats-table-container {
      width: 100%;
      max-width: 1100px;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .stats-table th,
    .stats-table td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    .stats-table th {
      background: #e6e8ff;
      color: #2e44ff;
      font-weight: 600;
    }

    .status-ok {
      color: #28a745;
      font-weight: bold;
    }

    .status-warning {
      color: #ffc107;
      font-weight: bold;
    }

    .btn-primary {
      margin-top: 15px;
      background: #2e44ff;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
  </style>

  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>

<body class="stats-page">

  <div class="container">
    <div id="header"></div>

    <div class="nav-buttons">
      <button class="btn-back" onclick="goBack()">Назад</button>
      <button class="btn-home" onclick="goHome()">Главная</button>
    </div>

    <main>
      <div class="stats-cards">
        <div class="stat-card">
          <h3>Активных каналов</h3>
          <p id="stat-channels">0</p>
        </div>
        <div class="stat-card">
          <h3>Всего обращений</h3>
          <p id="stat-requests">0</p>
        </div>
        <div class="stat-card">
          <h3>Аномалий (всего)</h3>
          <p id="stat-anomalies">0</p>
        </div>
        <div class="stat-card">
          <h3>Средний рейтинг</h3>
          <p id="stat-rating">0.0</p>
        </div>
      </div>

      <div id="chart_div">
        <p style="text-align:center; padding-top:100px; color:#999;">Загрузка графика...</p>
      </div>

      <div class="stats-table-container">
        <table class="stats-table">
          <thead>
            <tr>
              <th>Название канала</th>
              <th>Сообщений</th>
              <th>Аномалий</th>
              <th>Средний рейтинг</th>
              <th>Статус</th>
            </tr>
          </thead>
          <tbody id="stats-body">
          </tbody>
        </table>
      </div>
    </main>

    <div id="footer"></div>
  </div>

  <script src="../scripts/config.js"></script>
  <script src="../scripts/common.js"></script>
  <script>
    google.charts.load('current', { 'packages': ['corechart'] });

    async function loadStatistics() {
      const selectedIds = JSON.parse(localStorage.getItem("selected_channels") || "[]");
      const token = window.getAuthToken();

      if (selectedIds.length === 0) {
        document.querySelector("main").innerHTML = `
          <div style="text-align:center; margin-top:50px;">
            <h3>Нет выбранных каналов</h3>
            <p>Перейдите в раздел "Каналы", чтобы выбрать источники для анализа.</p>
            <button class="btn-primary" onclick="window.location.href='channels.html' style="margin-bottom: 20px;">К каналам</button>
          </div>`;
        return;
      }

      try {
        const response = await fetch(`${window.API_BASE}/api/reports/channels`, {
          headers: { "Authorization": `Bearer ${token}` }
        });

        if (!response.ok) throw new Error("Ошибка сервера");
        const data = await response.json();

        // Фильтруем только те каналы, которые выбрал пользователь
        const channels = data.channels.filter(ch => selectedIds.includes(String(ch.id)));

        let totalRequests = 0;
        let totalAnomalies = 0;
        let totalRatingSum = 0;
        let ratingCount = 0;

        const tableBody = document.getElementById("stats-body");
        tableBody.innerHTML = "";

        // Для графика соберем данные по дням (упрощенно: текущая дата)
        const dateMap = {};

        channels.forEach(ch => {
          const appeals = ch.appeals || [];
          const anomaliesCount = appeals.filter(a => ["fake", "spam", "offtopic", "unknown"].includes(a.type)).length;

          let channelRatingSum = 0;
          appeals.forEach(a => {
            totalRequests++;
            if (a.rating) {
              channelRatingSum += Number(a.rating);
              totalRatingSum += Number(a.rating);
              ratingCount++;
            }
            // Группировка для графика (по дате создания или текущей)
            const d = a.created_at ? new Date(a.created_at).toLocaleDateString() : new Date().toLocaleDateString();
            dateMap[d] = (dateMap[d] || 0) + 1;
          });

          totalAnomalies += anomaliesCount;
          const avgRating = appeals.length ? (channelRatingSum / appeals.length).toFixed(1) : "0.0";

          // Добавляем строку в таблицу
          const row = `
            <tr>
              <td><b>${ch.name}</b></td>
              <td>${appeals.length}</td>
              <td>${anomaliesCount}</td>
              <td>⭐ ${avgRating}</td>
              <td><span class="${anomaliesCount > 5 ? 'status-warning' : 'status-ok'}">
                ${anomaliesCount > 5 ? 'Check' : 'OK'}
              </span></td>
            </tr>`;
          tableBody.insertAdjacentHTML('beforeend', row);
        });

        // Обновляем карточки
        document.getElementById("stat-channels").textContent = channels.length;
        document.getElementById("stat-requests").textContent = totalRequests;
        document.getElementById("stat-anomalies").textContent = totalAnomalies;
        document.getElementById("stat-rating").textContent = ratingCount ? (totalRatingSum / ratingCount).toFixed(1) : "0.0";

        // Рисуем график
        const chartData = [["Дата", "Обращения"]];
        Object.keys(dateMap).sort().forEach(date => {
          chartData.push([date, dateMap[date]]);
        });

        if (chartData.length === 1) chartData.push([new Date().toLocaleDateString(), 0]);

        drawChart(chartData);

      } catch (err) {
        console.error(err);
        document.getElementById("chart_div").innerHTML = '<p style="color:red; text-align:center; padding-top:100px;">Ошибка загрузки данных</p>';
      }
    }

    function drawChart(chartData) {
      const data = google.visualization.arrayToDataTable(chartData);
      const options = {
        title: 'Активность обращений',
        curveType: 'function',
        legend: { position: 'bottom' },
        colors: ['#2e44ff'],
        chartArea: { width: '90%', height: '70%' }
      };
      const chart = new google.visualization.AreaChart(document.getElementById('chart_div'));
      chart.draw(data, options);
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadHeader();
      loadFooter();
      // Ждем немного, чтобы Google Charts успел инициализироваться
      google.charts.setOnLoadCallback(loadStatistics);
    });

    function goBack() { window.history.back(); }
    function goHome() { window.location.href = "home.html"; }
  </script>
</body>

</html>
