  <h1>Clair Backend Test</h1>

  <div class="container">

      <div id="meResult" class="result muted">Ожидание...</div>
      <div id="tokenBox" class="token-box">JWT: not stored</div>
    </div>

    <div class="card">
      <h2>Отчёты</h2>
      <div class="small">Путь: GET /api/channels/reports</div>

      <div id="reportsResult" class="result muted">Ожидание...</div>

    </div>

  <script>
    const AUTH_API = "http://localhost:3000/api/auth";
    const API = "http://localhost:3000/api";

    renderToken();

    function setResult(id, text, type = "muted") {
      const el = document.getElementById(id);
      el.className = "result " + type;
      el.textContent = text;
    }

    function renderToken() {
      const token = localStorage.getItem("token");
      document.getElementById("tokenBox").textContent = token
        ? "JWT:\n" + token
        : "JWT: not stored";
    }

    function clearToken() {
      localStorage.removeItem("token");
      renderToken();
      setResult("loginResult", "Token removed", "ok");
      setResult("meResult", "Ожидание...", "muted");
      setResult("reportsResult", "Ожидание...", "muted");
      document.getElementById("reports").innerHTML = "";
    }

    async function safeParseResponse(res) {
      const text = await res.text();
      try {
        return { ok: res.ok, status: res.status, data: JSON.parse(text) };
      } catch {
        return { ok: res.ok, status: res.status, data: text };
      }
    }

    async function registerUser() {
      const username = document.getElementById("reg_username").value.trim();
      const password = document.getElementById("reg_password").value.trim();
      const email = document.getElementById("reg_email").value.trim();

      setResult("registerResult", "Loading...", "muted");

      try {
        const res = await fetch(AUTH_API + "/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username,
            password,
            email
          })
        });

        const result = await safeParseResponse(res);

        if (!result.ok) {
          setResult(
            "registerResult",
            "Register error (" + result.status + "):\n" + JSON.stringify(result.data, null, 2),
            "err"
          );
          return;
        }

        setResult(
          "registerResult",
          "Register success:\n" + JSON.stringify(result.data, null, 2),
          "ok"
        );
      } catch (e) {
        setResult("registerResult", "Register exception: " + e.message, "err");
      }
    }

    async function loginUser() {
      const username = document.getElementById("login_username").value.trim();
      const password = document.getElementById("login_password").value.trim();

      setResult("loginResult", "Loading...", "muted");

      try {
        const res = await fetch(AUTH_API + "/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username,
            password
          })
        });

        const result = await safeParseResponse(res);

        if (!result.ok) {
          setResult(
            "loginResult",
            "Login error (" + result.status + "):\n" + JSON.stringify(result.data, null, 2),
            "err"
          );
          return;
        }

        if (!result.data || !result.data.access_token) {
          setResult(
            "loginResult",
            "Login success, but access_token not found:\n" + JSON.stringify(result.data, null, 2),
            "err"
          );
          return;
        }

        localStorage.setItem("token", result.data.access_token);
        renderToken();

        setResult(
          "loginResult",
          "Login success:\n" + JSON.stringify(result.data, null, 2),
          "ok"
        );
      } catch (e) {
        setResult("loginResult", "Login exception: " + e.message, "err");
      }
    }

    async function getMe() {
      const token = localStorage.getItem("token");

      if (!token) {
        setResult("meResult", "Нет токена. Сначала залогинься.", "err");
        return;
      }

      setResult("meResult", "Loading...", "muted");

      try {
        const res = await fetch(AUTH_API + "/me", {
          method: "GET",
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        const result = await safeParseResponse(res);

        if (!result.ok) {
          setResult(
            "meResult",
            "ME error (" + result.status + "):\n" + JSON.stringify(result.data, null, 2),
            "err"
          );
          return;
        }

        setResult(
          "meResult",
          "ME success:\n" + JSON.stringify(result.data, null, 2),
          "ok"
        );
      } catch (e) {
        setResult("meResult", "ME exception: " + e.message, "err");
      }
    }

    async function getReports() {
      const token = localStorage.getItem("token");

      if (!token) {
        setResult("reportsResult", "Нет токена. Сначала залогинься.", "err");
        return;
      }

      setResult("reportsResult", "Loading...", "muted");
      document.getElementById("reports").innerHTML = "";

      try {
        const res = await fetch(API + "/channels/reports", {
          method: "GET",
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        const result = await safeParseResponse(res);

        if (!result.ok) {
          setResult(
            "reportsResult",
            "Reports error (" + result.status + "):\n" + JSON.stringify(result.data, null, 2),
            "err"
          );
          return;
        }

        const channels = Array.isArray(result.data.channels) ? result.data.channels : [];
        renderReports(channels);
        setResult("reportsResult", "Loaded channels: " + channels.length, "ok");
      } catch (e) {
        setResult("reportsResult", "Reports exception: " + e.message, "err");
      }
    }

    function renderReports(channels) {
      const container = document.getElementById("reports");
      container.innerHTML = "";

      if (!channels.length) {
        container.innerHTML = "<div class='result muted'>Нет каналов или отзывов</div>";
        return;
      }

      channels.forEach(channel => {
        const channelDiv = document.createElement("div");
        channelDiv.className = "channel";

        const title = document.createElement("div");
        title.className = "channel-title";
        title.innerHTML =
          "Канал: " + (channel.name || "-") +
          "<br>ID: " + (channel.id ?? "-") +
          "<br>Key: " + (channel.channel_key || "-");

        channelDiv.appendChild(title);

        const appeals = Array.isArray(channel.appeals) ? channel.appeals : [];

        if (!appeals.length) {
          const empty = document.createElement("div");
          empty.className = "appeal";
          empty.textContent = "Нет отзывов";
          channelDiv.appendChild(empty);
        } else {
          appeals.forEach(a => {
            const appealDiv = document.createElement("div");
            appealDiv.className = "appeal";
            appealDiv.innerHTML =
              "<b>Appeal ID:</b> " + (a.id ?? "-") + "<br>" +
              "<b>Rating:</b> " + (a.rating ?? "-") + "<br>" +
              "<b>Emotion:</b> " + (a.emotion ?? "-") + "<br>" +
              "<b>Type:</b> " + (a.type ?? "-") + "<br>" +
              "<b>Status:</b> " + (a.status ?? "-") + "<br>" +
              "<b>Anomaly Type:</b> " + (a.anomaly_type ?? "-") + "<br>" +
              "<b>AI Comment:</b> " + (a.ai_comment ?? "-") + "<br>" +
              "<b>Org Comment:</b> " + (a.org_comment ?? "-");
            channelDiv.appendChild(appealDiv);
          });
        }

        container.appendChild(channelDiv);
      });
    }
  </script>

<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Регистрация — CLAIR</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>

<body class="auth-page">

  <script src="../scripts/config.js"></script>
  <script>
    if (localStorage.getItem("auth_token")) {
      window.location.href = "../main/home.html";
    }
  </script>

  <div class="container">
    <main>
      <div class="auth-wrapper">
        <div class="top-logo">
          <img src="../assets/logo/logo.svg" alt="CLAIR" />
        </div>

        <div class="card-auth">
          <h4><b>Создать аккаунт</b></h4>
          <div class="subtext">Заполните форму регистрации</div>

          <form id="regForm">
            <label class="form-label-custom" for="fullname">ФИО / Организация</label>
            <input id="fullname" class="form-control" type="text" placeholder="Example LTD" required />
            <div id="fullnameError" class="text-danger" style="font-size: 12px; margin-top: 4px; display: none;"></div>

            <label class="form-label-custom" for="email">Электронная почта</label>
            <input id="email" class="form-control" type="email" placeholder="example@clair.com" required />
            <div id="emailError" class="text-danger" style="font-size: 12px; margin-top: 4px; display: none;"></div>

            <label class="form-label-custom" for="password">Пароль</label>
            <input id="password" class="form-control" type="password" placeholder="****" required minlength="6" />
            <div id="passwordError" class="text-danger" style="font-size: 12px; margin-top: 4px; display: none;"></div>

            <button id="regBtn" class="btn btn-primary btn-primary-custom mt-3" type="submit">
              Регистрация
            </button>

            <button
              class="btn btn-outline btn-outline-custom mt-2"
              type="button"
              onclick="window.location.href='sign-in.html'">
              Авторизация
            </button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script>
    const fullnameInput = document.getElementById("fullname");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");

    const fullnameError = document.getElementById("fullnameError");
    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");
    const regBtn = document.getElementById("regBtn");

    function clearErrors() {
      fullnameError.style.display = "none";
      emailError.style.display = "none";
      passwordError.style.display = "none";

      fullnameError.textContent = "";
      emailError.textContent = "";
      passwordError.textContent = "";
    }

    function showError(target, message) {
      target.textContent = message;
      target.style.display = "block";
    }

    function setLoading(isLoading) {
      regBtn.disabled = isLoading;
      regBtn.textContent = isLoading ? "Загрузка..." : "Регистрация";
    }

    async function safeJson(response) {
      const text = await response.text();
      try {
        return text ? JSON.parse(text) : {};
      } catch (err) {
        console.error("Ошибка парсинга JSON:", err, text);
        return {};
      }
    }

    document.getElementById("regForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      clearErrors();
      setLoading(true);

      const fullname = fullnameInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!fullname) {
        showError(fullnameError, "Имя обязательно");
        setLoading(false);
        return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showError(emailError, "Неверный формат email");
        setLoading(false);
        return;
      }

      if (password.length < 6) {
        showError(passwordError, "Пароль должен быть не менее 6 символов");
        setLoading(false);
        return;
      }

      const payload = {
        username: email,
        password: password,
        full_name: fullname,
        email: email
      };

      console.log("Отправка запроса регистрации:", payload);

      try {
        const response = await retryFetch(window.API_BASE + "/api/auth/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await safeJson(response);
        console.log("Ответ сервера:", data);

        if (!response.ok) {
          const errorMsg = data.error || data.message || "Ошибка регистрации";

          const lower = String(errorMsg).toLowerCase();

          if (lower.includes("email") || lower.includes("почт") || lower.includes("существ")) {
            showError(emailError, errorMsg);
          } else if (lower.includes("парол")) {
            showError(passwordError, errorMsg);
          } else if (lower.includes("имя") || lower.includes("организац") || lower.includes("full_name")) {
            showError(fullnameError, errorMsg);
          } else {
            showError(emailError, errorMsg);
          }

          setLoading(false);
          return;
        }

        const token = data.access_token || data.token || null;

        if (token) {
          localStorage.setItem("auth_token", token);
        }

        localStorage.setItem("userName", fullname);
        localStorage.setItem("userEmail", email);

        console.info("Регистрация успешна");

        window.location.href = "../main/home.html";
      } catch (err) {
        console.error("Ошибка соединения с сервером:", err);
        alert("Ошибка соединения с сервером. Попробуйте позже.");
      } finally {
        setLoading(false);
      }
    });
  </script>

</body>
</html>
