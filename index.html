<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clair Test Frontend</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #222;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }

    .card h2 {
      margin-top: 0;
      font-size: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #555;
    }

    input, textarea {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 12px;
      border: 1px solid #d9dce3;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #4f46e5;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 14px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      margin-bottom: 10px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .secondary {
      background: #6b7280;
    }

    .secondary:hover {
      background: #4b5563;
    }

    .result {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      background: #f3f4f6;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
    }

    .ok {
      color: #166534;
      background: #dcfce7;
    }

    .err {
      color: #991b1b;
      background: #fee2e2;
    }

    .muted {
      color: #374151;
      background: #f3f4f6;
    }

    .token-box {
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-all;
      padding: 10px;
      border-radius: 10px;
      background: #eef2ff;
      margin-top: 10px;
    }

    .channel {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fafafa;
    }

    .channel-title {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .appeal {
      margin-top: 8px;
      padding: 10px;
      border-left: 4px solid #2563eb;
      background: white;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
    }

    .small {
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>Clair Backend Test</h1>

  <div class="container">
    <div class="card">
      <h2>Регистрация</h2>

      <label for="reg_username">Username</label>
      <input id="reg_username" placeholder="username" />

      <label for="reg_password">Password</label>
      <input id="reg_password" type="password" placeholder="password" />

      <label for="reg_email">Email</label>
      <input id="reg_email" placeholder="email" />

      <button onclick="registerUser()">Register</button>

      <div id="registerResult" class="result muted">Ожидание...</div>
    </div>

    <div class="card">
      <h2>Логин</h2>

      <label for="login_username">Username</label>
      <input id="login_username" placeholder="username" />

      <label for="login_password">Password</label>
      <input id="login_password" type="password" placeholder="password" />

      <button onclick="loginUser()">Login</button>
      <button class="secondary" onclick="getMe()">Check /me</button>
      <button class="secondary" onclick="clearToken()">Clear Token</button>

      <div id="loginResult" class="result muted">Ожидание...</div>
      <div id="meResult" class="result muted">Ожидание...</div>
      <div id="tokenBox" class="token-box">JWT: not stored</div>
    </div>

    <div class="card">
      <h2>Отчёты</h2>
      <div class="small">Путь: GET /api/channels/reports</div>

      <button onclick="getReports()">Load Reports</button>

      <div id="reportsResult" class="result muted">Ожидание...</div>
      <div id="reports"></div>
    </div>
  </div>

  <script>
    const AUTH_API = "/api/auth";
    const API = "/api";

    renderToken();

    function setResult(id, text, type = "muted") {
      const el = document.getElementById(id);
      el.className = "result " + type;
      el.textContent = text;
    }

    function renderToken() {
      const token = localStorage.getItem("token");
      document.getElementById("tokenBox").textContent = token
        ? "JWT:\n" + token
        : "JWT: not stored";
    }

    function clearToken() {
      localStorage.removeItem("token");
      renderToken();
      setResult("loginResult", "Token removed", "ok");
      setResult("meResult", "Ожидание...", "muted");
      setResult("reportsResult", "Ожидание...", "muted");
      document.getElementById("reports").innerHTML = "";
    }

    async function safeParseResponse(res) {
      const text = await res.text();
      try {
        return { ok: res.ok, status: res.status, data: JSON.parse(text) };
      } catch {
        return { ok: res.ok, status: res.status, data: text };
      }
    }

    async function registerUser() {
      const username = document.getElementById("reg_username").value.trim();
      const password = document.getElementById("reg_password").value.trim();
      const email = document.getElementById("reg_email").value.trim();

      setResult("registerResult", "Loading...", "muted");

      try {
        const res = await fetch(AUTH_API + "/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username,
            password,
            email
          })
        });

        const result = await safeParseResponse(res);

        if (!result.ok) {
          setResult(
            "registerResult",
            "Register error (" + result.status + "):\n" + JSON.stringify(result.data, null, 2),
            "err"
          );
          return;
        }

        setResult(
          "registerResult",
          "Register success:\n" + JSON.stringify(result.data, null, 2),
          "ok"
        );
      } catch (e) {
        setResult("registerResult", "Register exception: " + e.message, "err");
      }
    }

    async function loginUser() {
      const username = document.getElementById("login_username").value.trim();
      const password = document.getElementById("login_password").value.trim();

      setResult("loginResult", "Loading...", "muted");

      try {
        const res = await fetch(AUTH_API + "/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username,
            password
          })
        });

        const result = await safeParseResponse(res);

        if (!result.ok) {
          setResult(
            "loginResult",
            "Login error (" + result.status + "):\n" + JSON.stringify(result.data, null, 2),
            "err"
          );
          return;
        }

        if (!result.data || !result.data.access_token) {
          setResult(
            "loginResult",
            "Login success, but access_token not found:\n" + JSON.stringify(result.data, null, 2),
            "err"
          );
          return;
        }

        localStorage.setItem("token", result.data.access_token);
        renderToken();

        setResult(
          "loginResult",
          "Login success:\n" + JSON.stringify(result.data, null, 2),
          "ok"
        );
      } catch (e) {
        setResult("loginResult", "Login exception: " + e.message, "err");
      }
    }

    async function getMe() {
      const token = localStorage.getItem("token");

      if (!token) {
        setResult("meResult", "Нет токена. Сначала залогинься.", "err");
        return;
      }

      setResult("meResult", "Loading...", "muted");

      try {
        const res = await fetch(AUTH_API + "/me", {
          method: "GET",
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        const result = await safeParseResponse(res);

        if (!result.ok) {
          setResult(
            "meResult",
            "ME error (" + result.status + "):\n" + JSON.stringify(result.data, null, 2),
            "err"
          );
          return;
        }

        setResult(
          "meResult",
          "ME success:\n" + JSON.stringify(result.data, null, 2),
          "ok"
        );
      } catch (e) {
        setResult("meResult", "ME exception: " + e.message, "err");
      }
    }

    async function getReports() {
      const token = localStorage.getItem("token");

      if (!token) {
        setResult("reportsResult", "Нет токена. Сначала залогинься.", "err");
        return;
      }

      setResult("reportsResult", "Loading...", "muted");
      document.getElementById("reports").innerHTML = "";

      try {
        const res = await fetch(API + "/channels/reports", {
          method: "GET",
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        const result = await safeParseResponse(res);

        if (!result.ok) {
          setResult(
            "reportsResult",
            "Reports error (" + result.status + "):\n" + JSON.stringify(result.data, null, 2),
            "err"
          );
          return;
        }

        const channels = Array.isArray(result.data.channels) ? result.data.channels : [];
        renderReports(channels);
        setResult("reportsResult", "Loaded channels: " + channels.length, "ok");
      } catch (e) {
        setResult("reportsResult", "Reports exception: " + e.message, "err");
      }
    }

    function renderReports(channels) {
      const container = document.getElementById("reports");
      container.innerHTML = "";

      if (!channels.length) {
        container.innerHTML = "<div class='result muted'>Нет каналов или отзывов</div>";
        return;
      }

      channels.forEach(channel => {
        const channelDiv = document.createElement("div");
        channelDiv.className = "channel";

        const title = document.createElement("div");
        title.className = "channel-title";
        title.innerHTML =
          "Канал: " + (channel.name || "-") +
          "<br>ID: " + (channel.id ?? "-") +
          "<br>Key: " + (channel.channel_key || "-");

        channelDiv.appendChild(title);

        const appeals = Array.isArray(channel.appeals) ? channel.appeals : [];

        if (!appeals.length) {
          const empty = document.createElement("div");
          empty.className = "appeal";
          empty.textContent = "Нет отзывов";
          channelDiv.appendChild(empty);
        } else {
          appeals.forEach(a => {
            const appealDiv = document.createElement("div");
            appealDiv.className = "appeal";
            appealDiv.innerHTML =
              "<b>Appeal ID:</b> " + (a.id ?? "-") + "<br>" +
              "<b>Rating:</b> " + (a.rating ?? "-") + "<br>" +
              "<b>Emotion:</b> " + (a.emotion ?? "-") + "<br>" +
              "<b>Type:</b> " + (a.type ?? "-") + "<br>" +
              "<b>Status:</b> " + (a.status ?? "-") + "<br>" +
              "<b>Anomaly Type:</b> " + (a.anomaly_type ?? "-") + "<br>" +
              "<b>AI Comment:</b> " + (a.ai_comment ?? "-") + "<br>" +
              "<b>Org Comment:</b> " + (a.org_comment ?? "-");
            channelDiv.appendChild(appealDiv);
          });
        }

        container.appendChild(channelDiv);
      });
    }
  </script>
</body>
</html>
